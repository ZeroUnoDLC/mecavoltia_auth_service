name: build-and-push

# Construye la imagen arm64 del auth_service y la publica en GHCR.
# El deploy lo dispara aparte el repo mecavoltia_infra (control manual).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR exige el namespace en minúsculas
      - name: Resolver namespace
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # El server es ARM (Oracle Ampere): hay que construir para linux/arm64
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/mecavoltia-auth-service:latest
            ghcr.io/${{ steps.ns.outputs.owner }}/mecavoltia-auth-service:${{ github.sha }}
          # Vincula el paquete GHCR a este repo (aparece en el sidebar + hereda permisos)
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
